<title>🎬 Filmden İngilizce — Cümleleri Gerçek Sahnelerde Öğren</title>
<style>
  :root{
    --bg:#0d1117; --text:#f2f6fb; --muted:#aab6c4;
    --accent:#ff5c7a; --accent2:#4aa8ff; --gold:#ffb02e; --green:#3fb950;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%; overflow:hidden}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--text);
  }

  /* Üst bar */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    background:linear-gradient(180deg,rgba(13,17,23,.92),rgba(13,17,23,0));
    pointer-events:none;
  }
  .topbar > *{pointer-events:auto}
  .brand{font-weight:800; font-size:1.02rem; white-space:nowrap}
  .brand .film{color:var(--accent)}
  .chips{display:flex; gap:6px; margin-left:auto}
  .chip{
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:var(--muted);
    padding:6px 12px; border-radius:999px; cursor:pointer; font-size:.8rem; transition:.15s;
  }
  .chip.active{background:var(--accent2); border-color:var(--accent2); color:#04121f; font-weight:700}
  #searchBtn{
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); color:var(--text);
    width:38px; height:34px; border-radius:999px; cursor:pointer; font-size:1rem;
  }
  #searchBox{
    position:fixed; top:56px; left:14px; right:14px; z-index:20; display:none;
  }
  #searchBox.show{display:block}
  #search{
    width:100%; background:#1c2330; border:1px solid var(--accent2);
    color:var(--text); padding:12px 14px; border-radius:12px; font-size:.95rem; outline:none;
  }

  /* Kaydırmalı feed */
  .feed{
    height:100dvh; overflow-y:scroll; scroll-snap-type:y mandatory;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .feed::-webkit-scrollbar{display:none}

  .slide{
    height:100dvh; scroll-snap-align:start; scroll-snap-stop:always;
    display:flex; flex-direction:column; justify-content:center; align-items:center;
    text-align:center; padding:80px 22px 96px; position:relative;
  }
  .slide .inner{max-width:640px; width:100%; animation:pop .4s ease}
  @keyframes pop{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}

  .lvlTag{
    display:inline-block; font-size:.72rem; font-weight:800; letter-spacing:.5px;
    padding:4px 12px; border-radius:999px; margin-bottom:18px;
  }
  .lvlTag.A{background:rgba(63,185,80,.16); color:var(--green)}
  .lvlTag.B{background:rgba(74,168,255,.16); color:var(--accent2)}
  .lvlTag.C{background:rgba(255,92,122,.16); color:var(--accent)}

  .en{font-size:2.1rem; font-weight:800; line-height:1.25}
  .say{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; margin-left:8px; vertical-align:middle;
    background:rgba(255,176,46,.15); border-radius:50%; cursor:pointer; font-size:1.1rem;
  }
  .say:active{transform:scale(.9)}
  .tr{color:var(--muted); margin-top:16px; font-size:1.25rem; line-height:1.4}
  .movie{
    display:inline-flex; align-items:center; gap:6px; margin-top:20px;
    color:var(--gold); font-size:.85rem; background:rgba(255,176,46,.1);
    padding:6px 14px; border-radius:999px;
  }
  .links{display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-top:26px}
  .btn{
    display:inline-flex; align-items:center; gap:8px; text-decoration:none;
    padding:13px 22px; border-radius:14px; font-size:1rem; font-weight:700;
    transition:.15s; border:2px solid transparent;
  }
  .btn.play{background:var(--accent); color:#1a0007; box-shadow:0 6px 20px rgba(255,92,122,.35)}
  .btn.play:active{transform:scale(.96)}
  .btn.you{background:transparent; border-color:var(--accent2); color:var(--accent2)}

  /* Sağ alt: sayaç + kaydır ipucu */
  .counter{
    position:fixed; right:14px; bottom:16px; z-index:15;
    background:rgba(0,0,0,.4); color:var(--muted); font-size:.8rem;
    padding:5px 12px; border-radius:999px; backdrop-filter:blur(6px);
  }
  .swipe{
    position:fixed; left:0; right:0; bottom:14px; z-index:10; text-align:center;
    color:var(--muted); font-size:.78rem; pointer-events:none; animation:bob 1.6s ease-in-out infinite;
  }
  @keyframes bob{0%,100%{transform:translateY(0); opacity:.55} 50%{transform:translateY(-6px); opacity:1}}
  .empty{height:100dvh; display:flex; align-items:center; justify-content:center; color:var(--muted)}
</style>
</head>

const feed = document.getElementById('feed');
const chipsBox = document.getElementById('chips');
const search = document.getElementById('search');
const searchBtn = document.getElementById('searchBtn');
const searchBox = document.getElementById('searchBox');
const counter = document.getElementById('counter');
const swipe = document.getElementById('swipe');

let activeLvl = 'all';
let current = [];
const LVL_NAMES = {all:'Tümü', A:'A', B:'B', C:'C'};

['all','A','B','C'].forEach(l=>{
  const c = document.createElement('div');
  c.className = 'chip' + (l==='all'?' active':'');
  c.textContent = LVL_NAMES[l];
  c.onclick = ()=>{ activeLvl=l; [...chipsBox.children].forEach(x=>x.classList.remove('active')); c.classList.add('active'); render(); };
  chipsBox.appendChild(c);
});

searchBtn.onclick = ()=>{ searchBox.classList.toggle('show'); if(searchBox.classList.contains('show')) search.focus(); };

function pp(phrase){ return 'https://www.playphrase.me/#/search?q=' + encodeURIComponent(phrase); }
function yg(phrase){ return 'https://youglish.com/pronounce/' + encodeURIComponent(phrase) + '/english'; }

// Cihazın kendi sesiyle anında telaffuz
function speak(text){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = .9;
    speechSynthesis.speak(u);
  }catch(e){}
}

function render(){
  const q = search.value.trim().toLowerCase();
  current = DATA.filter(d=>{
    const okLvl = activeLvl==='all' || d.lvl===activeLvl;
    const okQ = !q || d.en.toLowerCase().includes(q) || d.tr.toLowerCase().includes(q);
    return okLvl && okQ;
  });
  if(!current.length){ feed.innerHTML = '<div class="empty">Sonuç bulunamadı 🔍</div>'; counter.textContent=''; return; }
  feed.innerHTML = current.map((d,i)=>`
    <section class="slide" data-i="${i}">
      <div class="inner">
        <span class="lvlTag ${d.lvl}">${d.lvl==='A'?'KOLAY':d.lvl==='B'?'ORTA':'İLERİ'}</span>
        <div class="en">${escapeHtml(d.en)}<span class="say" data-say="${escapeHtml(d.en)}" title="Dinle">🔊</span></div>
        <div class="tr">${escapeHtml(d.tr)}</div>
        <div class="movie">🎞️ ${escapeHtml(d.movie)}</div>
        <div class="links">
          <a class="btn play" href="${pp(d.en)}" target="_blank" rel="noopener">🎬 Filmde izle</a>
          <a class="btn you" href="${yg(d.en)}" target="_blank" rel="noopener">🔊 Telaffuz</a>
        </div>
      </div>
    </section>
  `).join('');
  feed.scrollTop = 0;
  updateCounter(0);
}

function updateCounter(i){ counter.textContent = (i+1) + ' / ' + current.length; }

// Anlık telaffuz (event delegation)
feed.addEventListener('click', e=>{
  const s = e.target.closest('.say');
  if(s){ speak(s.dataset.say); }
});

// Aktif slaytı takip et → sayaç + ipucu
let ticking=false;
feed.addEventListener('scroll', ()=>{
  if(swipe.style.opacity!=='0'){ swipe.style.opacity='0'; swipe.style.transition='opacity .4s'; }
  if(ticking) return; ticking=true;
  requestAnimationFrame(()=>{
    const i = Math.round(feed.scrollTop / window.innerHeight);
    updateCounter(Math.min(i, current.length-1));
    ticking=false;
  });
});

// Klavye ok tuşları (masaüstü)
window.addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'||e.key==='PageDown'){ feed.scrollBy({top:window.innerHeight, behavior:'smooth'}); e.preventDefault(); }
  if(e.key==='ArrowUp'||e.key==='PageUp'){ feed.scrollBy({top:-window.innerHeight, behavior:'smooth'}); e.preventDefault(); }
});

function escapeHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

search.addEventListener('input', render);
render();
</script>
